name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: 'Re-seed the database after deploying'
        type: boolean
        default: false

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  ACR_NAME:       acr4ba0be4f186fe
  ACR_REGISTRY:   acr4ba0be4f186fe.azurecr.io
  IMAGE:          acr4ba0be4f186fe.azurecr.io/backend
  CONTAINER_APP:  ca-backend-4ba0be4f186fe
  SEED_JOB:       job-seed-4ba0be4f186fe
  RESOURCE_GROUP: rg-deal-journey-deal-journey-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build on the GitHub runner with GHA layer cache.
      # First run: cold build ~3–5 min. Subsequent runs (no package.json change): ~1–2 min.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       ./backend/Dockerfile
          push:       true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Update Container App image
        run: |
          az containerapp update \
            --name            ${{ env.CONTAINER_APP }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --image           ${{ env.IMAGE }}:${{ github.sha }}

      - name: Update seed job image
        run: |
          az containerapp job update \
            --name            ${{ env.SEED_JOB }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --image           ${{ env.IMAGE }}:${{ github.sha }}

      # Re-seed only when manually triggered with run_seed=true
      - name: Run seed job
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seed == true }}
        run: |
          az containerapp job start \
            --name           ${{ env.SEED_JOB }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

          echo "Waiting for seed job to complete..."
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution list \
              --name           ${{ env.SEED_JOB }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[0].properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/30: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Seed job completed successfully."
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Seed job failed — check Container App job logs."
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for seed job."
          exit 1
